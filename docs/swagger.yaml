basePath: /
definitions:
  controllers.AddToCartRequest:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    required:
    - product_id
    - quantity
    type: object
  controllers.CreateProductRequest:
    properties:
      description:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
    required:
    - name
    - price
    - stock
    type: object
  controllers.LoginRequest:
    properties:
      password:
        example: "1234"
        type: string
      username:
        example: user
        type: string
    type: object
  controllers.RegisterRequest:
    properties:
      email:
        example: john@email.com
        type: string
      password:
        example: "123456"
        type: string
      username:
        example: john
        type: string
    type: object
  controllers.UpdateCartItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    required:
    - product_id
    - quantity
    type: object
  controllers.UpdateOrderStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  models.Order:
    properties:
      createdAt:
        type: string
      id:
        type: string
      orderItems:
        items:
          $ref: '#/definitions/models.OrderItem'
        type: array
      payments:
        items:
          $ref: '#/definitions/models.Payment'
        type: array
      status:
        type: string
      total:
        type: number
      updatedAt:
        type: string
      userID:
        type: string
    type: object
  models.OrderItem:
    properties:
      id:
        type: string
      orderID:
        type: string
      price:
        format: float64
        type: number
      productID:
        type: string
      quantity:
        type: integer
    type: object
  models.Payment:
    properties:
      amount:
        format: float64
        type: number
      createdAt:
        type: string
      id:
        type: string
      method:
        type: string
      orderID:
        type: string
      status:
        description: pending, success, failed
        type: string
    type: object
  models.Product:
    properties:
      averageRating:
        format: float64
        type: number
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: number
      reviews:
        items:
          $ref: '#/definitions/models.Review'
        type: array
      stock:
        type: integer
      updatedAt:
        type: string
    type: object
  models.Review:
    properties:
      comment:
        type: string
      createdAt:
        type: string
      id:
        type: string
      productID:
        type: string
      rating:
        type: integer
      updatedAt:
        type: string
      userID:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend API for E-Commerce system
  title: E-Commerce API
  version: "1.0"
paths:
  /admin/orders:
    get:
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Order'
            type: array
      security:
      - BearerAuth: []
      summary: Get all orders
      tags:
      - orders
  /admin/profile:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - auth
  /cart:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get cart
      tags:
      - cart
  /cart/items:
    post:
      consumes:
      - application/json
      parameters:
      - description: Add to cart data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.AddToCartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Add product to cart
      tags:
      - cart
    put:
      consumes:
      - application/json
      parameters:
      - description: Update cart item data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.UpdateCartItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update cart item
      tags:
      - cart
  /login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - auth
  /orders:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Order'
            type: array
      security:
      - BearerAuth: []
      summary: Get my orders
      tags:
      - orders
  /orders/{id}:
    get:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Order'
      security:
      - BearerAuth: []
      summary: Get order detail
      tags:
      - orders
  /orders/{id}/cancel:
    put:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cancel order
      tags:
      - orders
  /orders/{id}/pay:
    post:
      consumes:
      - application/json
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Pay order
      tags:
      - payment
  /orders/{id}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: Update order status data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.UpdateOrderStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update order status
      tags:
      - orders
  /orders/checkout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Order'
      security:
      - BearerAuth: []
      summary: Checkout order
      tags:
      - orders
  /products:
    get:
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Product'
            type: array
      summary: Get products
      tags:
      - products
    post:
      consumes:
      - application/json
      parameters:
      - description: Create product data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
      security:
      - BearerAuth: []
      summary: Create product
      tags:
      - products
  /products/{id}:
    delete:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete product
      tags:
      - products
    put:
      consumes:
      - application/json
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      - description: Update product data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
      security:
      - BearerAuth: []
      summary: Update product
      tags:
      - products
  /register:
    post:
      consumes:
      - application/json
      description: Create new user account
      parameters:
      - description: Register data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Register user
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
